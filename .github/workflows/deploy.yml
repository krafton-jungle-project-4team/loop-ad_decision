name: Deploy Decision API

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: krafton-jungle-project-4team/loop-ad_infra/.github/workflows/ecs-deploy.yml@main
    with:
      environment: dev
      aws_region: ap-northeast-2
      role_arn: ${{ vars.LOOP_AD_DEV_ECS_DEPLOY_ROLE_ARN }}
      service_name: decision-api
      ecr_repository: loop-ad/decision-api
      ecs_cluster: dev-loop-ad-cluster
      ecs_service: dev-decision-api
      container_name: decision-api
      dockerfile: Dockerfile
      context: .
      image_tag: ${{ github.sha }}
      wait_for_service_stability: true
