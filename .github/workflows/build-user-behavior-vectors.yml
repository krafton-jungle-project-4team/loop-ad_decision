name: Build User Behavior Vectors

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "Project id to build vectors for"
        required: true
        default: "demo_project"
      vector_version:
        description: "Vector version written to ClickHouse"
        required: true
        default: "hotel_behavior.v2"
      window_days:
        description: "Source event lookback window in days"
        required: true
        default: "30"
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: read

jobs:
  trigger-decision-batch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Decision user behavior vector batch
        env:
          DECISION_API_URL: https://decision.api.dev.loop-ad.org
          LOOPAD_INTERNAL_API_KEY: ${{ secrets.LOOPAD_INTERNAL_API_KEY }}
          PROJECT_ID: ${{ inputs.project_id || 'demo_project' }}
          VECTOR_VERSION: ${{ inputs.vector_version || 'hotel_behavior.v2' }}
          WINDOW_DAYS: ${{ inputs.window_days || '30' }}
        run: |
          test -n "$DECISION_API_URL"
          test -n "$LOOPAD_INTERNAL_API_KEY"
          payload="$(jq -n \
            --arg project_id "$PROJECT_ID" \
            --arg vector_version "$VECTOR_VERSION" \
            --argjson window_days "$WINDOW_DAYS" \
            '{
              project_id: $project_id,
              vector_version: $vector_version,
              window_days: $window_days
            }')"
          build_response="$(curl --fail-with-body --show-error --silent --max-time 900 \
            -X POST "$DECISION_API_URL/internal/decision/v1/batches/user-behavior-vectors/build" \
            -H "Content-Type: application/json" \
            -H "X-Loop-Ad-Internal-Key: $LOOPAD_INTERNAL_API_KEY" \
            -d "$payload")"
          vector_generation_id="$(printf '%s' "$build_response" | jq -er '.vector_generation_id')"
          sync_payload="$(jq -n \
            --arg project_id "$PROJECT_ID" \
            --arg vector_version "$VECTOR_VERSION" \
            --arg vector_generation_id "$vector_generation_id" \
            '{
              project_id: $project_id,
              vector_version: $vector_version,
              vector_generation_id: $vector_generation_id,
              batch_size: 5000,
              max_batches: 100
            }')"
          sync_response="$(curl --fail-with-body --show-error --silent --max-time 900 \
            -X POST "$DECISION_API_URL/internal/decision/v1/batches/user-behavior-vector-search/sync" \
            -H "Content-Type: application/json" \
            -H "X-Loop-Ad-Internal-Key: $LOOPAD_INTERNAL_API_KEY" \
            -d "$sync_payload")"
          printf '%s' "$sync_response" | jq -e '.status == "activated"'
